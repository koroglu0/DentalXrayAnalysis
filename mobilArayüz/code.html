<!DOCTYPE html>

<html lang="tr"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>DentalAI - Giriş Yap</title>
<!-- Tailwind CSS v3 CDN -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<!-- Custom Typography & Specific Layout Styles -->
<style data-purpose="typography">
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
    body {
      font-family: 'Inter', sans-serif;
    }
  </style>
<style data-purpose="custom-styling">
    /* Custom background for the top visual section to match IMAGE_4 */
    .hero-gradient {
      background: radial-gradient(circle at center, #1a2a3a 0%, #0a0f14 100%);
      position: relative;
      overflow: hidden;
    }
    /* Grid overlay effect */
    .hero-grid {
      background-image: linear-gradient(rgba(255, 255, 255, 0.05) 1px, transparent 1px),
                        linear-gradient(90px, rgba(255, 255, 255, 0.05) 1px, transparent 1px);
      background-size: 40px 40px;
    }
    /* Brand Cyan color */
    .bg-brand-cyan {
      background-color: #00bcd4;
    }
    .text-brand-cyan {
      color: #00bcd4;
    }
    /* Input field styling */
    .form-input-custom {
      @apply w-full px-4 py-3 rounded-xl border border-gray-100 bg-gray-50/50 focus:ring-2 focus:ring-cyan-500 focus:border-transparent transition-all outline-none;
    }
  </style>
</head>
<body class="bg-white text-slate-900 antialiased min-h-screen flex flex-col">
<!-- BEGIN: Mobile Hero Section -->
<!-- This section reflects the right side of the desktop image for mobile branding -->
<header class="hero-gradient h-64 flex flex-col items-center justify-center relative px-6 text-center" data-purpose="mobile-header-branding">
<div class="hero-grid absolute inset-0 opacity-20"></div>
<!-- Dental Graphic Representation -->
<div class="relative z-10 mb-4" data-purpose="dental-graphic">
<div class="w-24 h-24 rounded-full border-2 border-cyan-500/30 flex items-center justify-center bg-cyan-900/20">
<svg class="w-12 h-12 text-cyan-400 fill-current opacity-80" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M12,2C12,2 7,2 7,7C7,12 12,22 12,22C12,22 17,12 17,7C17,2 12,2 12,2Z"></path>
</svg>
</div>
<!-- Small data badges matching the original image -->
<div class="absolute -right-4 -top-2 bg-slate-800/80 backdrop-blur-sm border border-slate-700 rounded-lg p-1.5 text-[8px] text-white">
<span class="block text-gray-400">ANALİZ SÜRESİ</span>
<span class="font-bold">~3 Saniye</span>
</div>
</div>
<div class="relative z-10">
<span class="inline-flex items-center px-3 py-1 rounded-full bg-cyan-900/40 border border-cyan-500/30 text-[10px] text-cyan-300 font-bold tracking-wider mb-2">
<svg class="w-2 h-2 mr-1 fill-current" viewbox="0 0 8 8"><circle cx="4" cy="4" r="4"></circle></svg>
        ANALİZ SÜRESİ
      </span>
<h1 class="text-xl font-bold text-white leading-tight">Yapay Zeka Destekli <br/> <span class="text-cyan-400">Diş Teşhisi</span></h1>
</div>
</header>
<!-- END: Mobile Hero Section -->
<!-- BEGIN: Login Form Section -->
<main class="flex-grow px-6 py-8 -mt-6 bg-white rounded-t-3xl relative z-20" data-purpose="login-form-container">
<!-- Logo and Welcome -->
<div class="mb-8" data-purpose="branding-header">
<div class="flex items-center gap-2 mb-4">
<div class="w-6 h-6 bg-brand-cyan rounded-md flex items-center justify-center">
<svg class="w-4 h-4 text-white fill-current" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M12,2C12,2 7,2 7,7C7,12 12,22 12,22C12,22 17,12 17,7C17,2 12,2 12,2Z"></path></svg>
</div>
<span class="font-bold text-lg text-slate-800">DentalAI</span>
</div>
<h2 class="text-2xl font-bold text-slate-900">Tekrar Hoşgeldiniz</h2>
<p class="text-slate-500 text-sm mt-1">Güvenli hesabınıza erişmek için bilgilerinizi girin.</p>
</div>
<!-- Login Form -->
<form action="#" class="space-y-5" data-purpose="auth-form" method="POST">
<!-- Email Field -->
<div>
<label class="block text-sm font-semibold text-slate-700 mb-2" for="email">E-posta Adresi</label>
<input class="form-input-custom text-slate-900 placeholder:text-slate-300" id="email" name="email" placeholder="ornek@dentalai.com" required="" type="email"/>
</div>
<!-- Password Field -->
<div>
<div class="flex justify-between items-center mb-2">
<label class="block text-sm font-semibold text-slate-700" for="password">Şifre</label>
<a class="text-xs font-bold text-brand-cyan hover:text-cyan-600 transition-colors" href="#">Şifremi Unuttum?</a>
</div>
<div class="relative">
<input class="form-input-custom text-slate-900 placeholder:text-slate-300" id="password" name="password" placeholder="••••••" required="" type="password"/>
<button class="absolute right-4 top-1/2 -translate-y-1/2 text-slate-400" type="button">
<svg class="w-5 h-5" fill="none" stroke="currentColor" viewbox="0 0 24 24"><path d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path><path d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path></svg>
</button>
</div>
</div>
<!-- Submit Button -->
<button class="w-full bg-brand-cyan hover:bg-cyan-500 text-white font-bold py-3.5 rounded-xl shadow-lg shadow-cyan-200 transition-all active:scale-[0.98] mt-2" type="submit">
        Giriş Yap
      </button>
<!-- Divider -->
<div class="relative py-4 flex items-center">
<div class="flex-grow border-t border-slate-100"></div>
<span class="flex-shrink mx-4 text-slate-400 text-[10px] font-bold tracking-widest uppercase">VEYA</span>
<div class="flex-grow border-t border-slate-100"></div>
</div>
<!-- Social Login -->
<button class="w-full flex items-center justify-center gap-3 bg-white border border-slate-200 hover:bg-slate-50 text-slate-700 font-semibold py-3 rounded-xl transition-all" type="button">
<svg class="w-5 h-5" viewbox="0 0 24 24">
<path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"></path>
<path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"></path>
<path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"></path>
<path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"></path>
</svg>
        Google ile devam et
      </button>
<!-- Sign Up Link -->
<div class="text-center pt-4">
<p class="text-slate-500 text-sm">Hesabınız yok mu? <a class="text-brand-cyan font-bold hover:underline" href="#">Kayıt Olun</a></p>
</div>
</form>
</main>
<!-- END: Login Form Section -->
<!-- BEGIN: Footer -->
<footer class="p-6 text-center" data-purpose="legal-footer">
<div class="flex items-center justify-center gap-2 text-[10px] text-slate-400 font-medium">
<svg class="w-3 h-3" fill="none" stroke="currentColor" viewbox="0 0 24 24"><path d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path></svg>
<span>Güvenli &amp; HIPAA Uyumlu</span>
</div>
</footer>
<!-- END: Footer -->
</body></html>

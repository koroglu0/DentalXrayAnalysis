services:
  - type: web
    name: dental-ai-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn application:application --bind 0.0.0.0:$PORT --workers 2 --timeout 120
    plan: free
    envVars:
      - key: FLASK_ENV
        value: production
      - key: AWS_REGION
        value: eu-north-1
      - key: USE_COGNITO
        value: "true"
      - key: COGNITO_REGION
        value: eu-north-1
